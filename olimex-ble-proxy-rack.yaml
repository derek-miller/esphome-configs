packages:
  base: !include olimex-ble-proxy.yaml

esphome:
  build_path: build/olimex-bluetooth-proxy-rack

button:
  - platform: template
    name: Back Porch Fan Off
    internal: true
    id: button_bp_fan_off
    on_press:
      - lambda: 'id(my_cc1101).set_frequency(303798000);'
      - delay: 5ms
      - remote_transmitter.transmit_rc_switch_raw:
          transmitter_id: rf_tx
          code: '010100000111111000100000'
          protocol:
            pulse_length: 384
            sync: [36, 1]
            zero: [1, 2]
            one: [2, 1]
            inverted: true
          repeat:
            times: 20
            wait_time: 0s

