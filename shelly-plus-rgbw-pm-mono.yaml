esphome:
  name: shelly-plus-rgbw-pm-mono
  friendly_name: Shelly Plus RGBW PM Mono
  name_add_mac_suffix: true

web_server:
  local: true
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

esp32:
  variant: esp32
  framework:
    type: esp-idf

wifi:
  ap:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

captive_portal:

logger:

api:
  reboot_timeout: 0s
#  encryption:
#    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

output:
  - platform: ledc
    pin: GPIO4 # W
    id: pwm_output
    frequency: 19531

light:
  - platform: monochromatic
    name: Light
    output: pwm_output
    id: light_output
    gamma_correct: 2.8
    restore_mode: ALWAYS_OFF
    default_transition_length: 500ms

sensor:
  # Temperature
  - platform: adc
    pin: GPIO33
    id: temp_analog_reading
    attenuation: 12db

  - platform: resistance
    sensor: temp_analog_reading
    id: temp_resistance_reading
    configuration: DOWNSTREAM
    resistor: 10kOhm

  - platform: ntc
    sensor: temp_resistance_reading
    name: Temperature
    unit_of_measurement: °C
    accuracy_decimals: 1
    icon: mdi:thermometer
    calibration:
      b_constant: 3350
      reference_resistance: 10kOhm
      reference_temperature: 298.15K

  # Power monitoring
  - platform: adc
    pin: GPIO34
    attenuation: 12db
    name: Voltage
    id: voltage
    accuracy_decimals: 1
    unit_of_measurement: V
    update_interval: 2s
    filters:
      - multiply: 10.85

  - platform: adc
    pin: GPIO35
    attenuation: 12db
    name: Current
    id: current
    accuracy_decimals: 2
    unit_of_measurement: A
    update_interval: 2s
    filters:
      - calibrate_linear:
          - 0.7690 -> 0.0
          - 0.7710 -> 0.012
          - 0.7800 -> 0.196
          - 0.8200 -> 0.839
          - 0.9000 -> 2.141
      - clamp:
          min_value: 0
          max_value: 10

  - platform: template
    name: Power
    id: power
    unit_of_measurement: W
    accuracy_decimals: 1
    icon: mdi:flash-outline
    lambda: |-
      return id(voltage).state * id(current).state;
    update_interval: 2s


binary_sensor:
  # Momentary switch UP throw (I1)
  - platform: gpio
    pin:
      number: GPIO36
      inverted: true
    id: button_up
    filters:
      - delayed_on_off: 50ms
    on_click:
      - min_length: 50ms
        max_length: 350ms
        then:
          - light.turn_on:
              id: light_output
              brightness: 100%
    on_multi_click:
      - timing:
          - ON for at least 500ms
        then:
          - while:
              condition:
                binary_sensor.is_on: button_up
              then:
                - light.dim_relative:
                    id: light_output
                    relative_brightness: 2%
                    transition_length: 50ms
                - delay: 50ms

  # Momentary switch DOWN throw (I3 — I2 defective on this unit)
  - platform: gpio
    pin:
      number: GPIO38
      inverted: true
    id: button_down
    filters:
      - delayed_on_off: 50ms
    on_click:
      - min_length: 50ms
        max_length: 350ms
        then:
          - light.turn_off: light_output
    on_multi_click:
      - timing:
          - ON for at least 500ms
        then:
          - while:
              condition:
                binary_sensor.is_on: button_down
              then:
                - light.dim_relative:
                    id: light_output
                    relative_brightness: -2%
                    transition_length: 50ms
                - delay: 50ms

  - platform: gpio
    name: Button
    pin:
      number: GPIO22
    filters:
      - delayed_on_off: 10ms
    on_press:
      then:
        - light.toggle: light_output

status_led:
  pin: GPIO14