script:
  - id: send_bp_fan_state
    then:
      - lambda: |-
          if (id(bp_fan).state) {
            int speed = id(bp_fan).speed;
            if (speed <= 0) speed = 1;
            if (speed > 6) speed = 6;
            switch (speed) {
              case 1: id(button_bp_fan_speed1).press(); break;
              case 2: id(button_bp_fan_speed2).press(); break;
              case 3: id(button_bp_fan_speed3).press(); break;
              case 4: id(button_bp_fan_speed4).press(); break;
              case 5: id(button_bp_fan_speed5).press(); break;
              case 6: id(button_bp_fan_speed6).press(); break;
            }
          } else {
            id(button_bp_fan_off).press();
          }

  - id: send_br2_fan_state
    then:
      - lambda: |-
          if (id(br2_fan).state) {
            int speed = id(br2_fan).speed;
            if (speed <= 0) speed = 1;
            if (speed > 6) speed = 6;
            switch (speed) {
              case 1: id(button_br2_fan_speed1).press(); break;
              case 2: id(button_br2_fan_speed2).press(); break;
              case 3: id(button_br2_fan_speed3).press(); break;
              case 4: id(button_br2_fan_speed4).press(); break;
              case 5: id(button_br2_fan_speed5).press(); break;
              case 6: id(button_br2_fan_speed6).press(); break;
            }
          } else {
            id(button_br2_fan_off).press();
          }

fan:
  - platform: template
    name: Back Porch Fan
    id: bp_fan
    speed_count: 6
    has_direction: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - script.execute: send_bp_fan_state
    on_turn_off:
      - script.execute: send_bp_fan_state
    on_speed_set:
      - lambda: |-
          auto call = id(bp_fan).turn_on();
          call.perform();
    on_direction_set:
      - button.press: button_bp_fan_reverse

  - platform: template
    name: Bedroom 2 Fan
    id: br2_fan
    speed_count: 6
    has_direction: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - script.execute: send_br2_fan_state
    on_turn_off:
      - script.execute: send_br2_fan_state
    on_speed_set:
      - lambda: |-
          auto call = id(br2_fan).turn_on();
          call.perform();
    on_direction_set:
      - button.press: button_br2_fan_reverse

switch:
  - platform: template
    name: Advent Calendar House Lights
    id: switch_advent_house_lights
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - button.press: button_advent_house_lights_on
    turn_off_action:
      - button.press: button_advent_house_lights_off

  - platform: template
    name: Advent Calendar
    id: switch_advent_calendar
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - button.press: button_advent_on
    turn_off_action:
      - button.press: button_advent_off

  - platform: template
    name: Advent Calendar Timer
    id: switch_advent_timer
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - button.press: button_advent_timer_on
    turn_off_action:
      - button.press: button_advent_timer_off

  - platform: template
    name: Christmas Tree
    id: switch_christmas_tree
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - button.press: button_christmas_tree_on
    turn_off_action:
      - button.press: button_christmas_tree_off

  - platform: template
    name: Back Porch Fan Repeat
    id: switch_bp_fan_repeat
    optimistic: true
    restore_mode: ALWAYS_ON

  - platform: template
    name: Bedroom 2 Fan Repeat
    id: switch_br2_fan_repeat
    optimistic: true
    restore_mode: ALWAYS_ON

interval:
  - interval: 10s
    then:
      - if:
          condition:
            switch.is_on: switch_bp_fan_repeat
          then:
            - script.execute: send_bp_fan_state
      - delay: 2s
      - if:
          condition:
            switch.is_on: switch_br2_fan_repeat
          then:
            - script.execute: send_br2_fan_state