esphome:
  name: olimex-bluetooth-proxy
  friendly_name: Olimex Bluetooth Proxy
  min_version: 2025.8.0
  name_add_mac_suffix: true

esp32:
  board: esp32-poe-iso
  variant: esp32
  framework:
    type: esp-idf

web_server:
  local: true
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    mode: CLK_OUT
    pin: GPIO17
  phy_addr: 0
  power_pin: GPIO12

logger:
  level: DEBUG

api:
#  encryption:
#    key: !secret api_encryption_key

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

esp32_ble:
  max_connections: 4

esp32_ble_tracker:
# The default scan parameters are recommended.
# Aggressive scan settings (e.g., interval/window of 1100ms) typically
# provide no benefit while increasing CPU usage and may cause
# overheating.

bluetooth_proxy:
  active: true
  connection_slots: 4

button:
  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot

  - platform: factory_reset
    id: button_factory_reset
    name: Factory Reset

  - platform: restart
    id: button_restart
    name: Restart


# EBYTE Wiring (via UEXT 10-pin IDC breakout cable)
#   pad 9  (VCC)  -> UEXT pin 1  (3.3V)   -> brown
#   pad 11 (GND)  -> UEXT pin 2  (GND)    -> red
#   pad 15 (GDO0) -> UEXT pin 3  (GPIO4)  -> orange  (TX)
#   pad 14 (GDO2) -> UEXT pin 4  (GPIO36) -> yellow  (RX)
#   NC     (SCL)  -> UEXT pin 5  (GPIO13) -> green
#   NC     (SDA)  -> UEXT pin 6  (GPIO16) -> blue
#   pad 16 (MISO) -> UEXT pin 7  (GPIO15) -> purple
#   pad 17 (MOSI) -> UEXT pin 8  (GPIO2)  -> grey
#   pad 18 (SCK)  -> UEXT pin 9  (GPIO14) -> white
#   pad 19 (CSN)  -> UEXT pin 10 (GPIO5)  -> black

# CC1101 Wiring (via UEXT 10-pin IDC breakout cable)
#   pin 2 (VCC)  -> UEXT pin 1  (3.3V)   -> purple
#   pin 1 (GND)  -> UEXT pin 2  (GND)    -> grey
#   pin 3 (GDO0) -> UEXT pin 3  (GPIO4)  -> blue    (TX)
#   pin 8 (GDO2) -> UEXT pin 4  (GPIO36) -> green   (RX)
#   NC    (SCL)  -> UEXT pin 5  (GPIO13) -> green
#   NC    (SDA)  -> UEXT pin 6  (GPIO16) -> blue
#   pin 7 (MISO) -> UEXT pin 7  (GPIO15) -> red
#   pin 6 (MOSI) -> UEXT pin 8  (GPIO2)  -> brown
#   pin 5 (SCK)  -> UEXT pin 9  (GPIO14) -> black
#   pin 4 (CSN)  -> UEXT pin 10 (GPIO5)  -> white

# SPI bus for CC1101
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO2
  miso_pin: GPIO15

# CC1101 RF
cc1101:
  id: my_cc1101
  cs_pin: GPIO5
  frequency: 433.92MHz
  modulation_type: ASK/OOK

number:
  - platform: template
    name: CC1101 Frequency
    id: cc1101_frequency
    unit_of_measurement: MHz
    min_value: 300
    max_value: 928
    step: 0.001
    initial_value: 433.92
    restore_value: true
    optimistic: true
    mode: box
    on_value:
      then:
        - lambda: 'id(my_cc1101).set_frequency(x * 1000000);'
        - cc1101.begin_rx
        - logger.log:
            format: "CC1101 frequency set to %.3f MHz"
            args: ['x']

# IR Receiver 3.5mm Jack Wiring (Herfair B01N224O0J)
#   Tip    (VCC)    -> 3.3V
#   Ring   (Signal) -> GPIO32
#   Sleeve (GND)    -> GND

# IR Emitter 3.5mm Jack Wiring
#   Tip    (Signal) -> GPIO33
#   Sleeve (GND)    -> GND

remote_transmitter:
  # IR Transmitter (EXT1 GPIO33)
  - id: ir_tx
    pin: GPIO33
    carrier_duty_percent: 50%

  # RF Transmitter (CC1101 GDO0)
  - id: rf_tx
    pin: GPIO4
    carrier_duty_percent: 100%
    non_blocking: false
    on_transmit:
      then:
        - cc1101.begin_tx
    on_complete:
      then:
        - lambda: 'id(my_cc1101).set_frequency(id(cc1101_frequency).state * 1000000);'
        - cc1101.begin_rx

remote_receiver:
  # IR Receiver (GPIO32)
  - id: ir_rx
    pin:
      number: GPIO32
      inverted: true
      mode:
        input: true
        pullup: true
    dump: all
    tolerance: 25%
    filter: 50us
    idle: 10ms

  # RF Receiver (CC1101 GDO2)
  - id: rf_rx
    pin:
      number: GPIO36
      inverted: true
    dump: all
    tolerance: 50%
    filter: 250us
    idle: 4ms
